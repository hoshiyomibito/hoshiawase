<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | 星合 -ほしあわせ-</title>
<style>
  :root{--night:#04060f;--star-gold:#ffd98a;--emerald:#6ee6be;--line:rgba(143,208,255,.22);
    --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    --sans:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--night);color:#e8ecf5;font-family:var(--sans);line-height:1.9}
  .wrap{max-width:640px;margin:0 auto;padding:48px 20px 80px}
  h1{font-family:var(--serif);font-size:26px;color:var(--star-gold);margin-bottom:20px;letter-spacing:.1em}
  p{font-size:14.5px;opacity:.9;margin-bottom:16px}
  .cta{text-align:center;margin:30px 0}
  .btn{display:inline-block;background:linear-gradient(180deg,#2a3d6e,#182550);border:1px solid var(--star-gold);
    color:#fff;border-radius:999px;padding:14px 40px;font-size:15px;letter-spacing:.15em;text-decoration:none}
  .btn:active{transform:scale(.97)}
  .note{font-size:12px;opacity:.6}
  .back{display:inline-block;margin-top:30px;color:#9fc4ff;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>お問い合わせ</h1>
  <p>「星合 -ほしあわせ-」に関するご質問・不具合報告・ご感想は、下記のフォームからお寄せください。</p>
  <div class="cta">
    <a class="btn" href="https://forms.gle/XXXXXXXXXXXX" target="_blank" rel="noopener">お問い合わせフォームを開く</a>
  </div>
  <p class="note">※フォームは Google フォームを利用しています。送信いただいた内容は運営者のみが確認し、返信が必要な場合に限りご記入いただいた連絡先を使用します。</p>
  <a class="back" href="index.html">← トップへ戻る</a>
</div>
</body>
</html>
