<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星合 -ほしあわせ- 88星座パズル</title>
<style>
  :root{
    --night:#04060f; --star-gold:#ffd98a; --ui-blue:#8fd0ff; --emerald:#6ee6be;
    --ok:#a7e8b4; --ng:#ff9a9a;
    --panel:rgba(8,14,32,.94); --line:rgba(143,208,255,.22);
    --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    --sans:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--night);color:#e8ecf5;font-family:var(--sans)}
  #sky{position:fixed;inset:0;width:100%;height:100%;touch-action:none;cursor:grab}
  #sky.dragging{cursor:grabbing}
  #labels{position:fixed;inset:0;pointer-events:none;overflow:hidden}
  .clabel{position:absolute;transform:translate(-50%,-50%);font-family:var(--serif);
    color:var(--star-gold);text-shadow:0 0 8px rgba(255,217,138,.55);font-size:14px;letter-spacing:.14em;white-space:nowrap}
  .mlabel{position:absolute;transform:translate(-50%,-135%);font-size:10.5px;color:#b8f0e0;
    text-shadow:0 0 6px rgba(120,240,200,.5);white-space:nowrap}
  .plabel{position:absolute;transform:translate(-50%,-50%);font-size:11px;color:#9fb4e8;opacity:.8;
    letter-spacing:.15em;text-shadow:0 0 6px rgba(120,150,255,.6);white-space:nowrap}
  .slabel{position:absolute;transform:translate(-50%,-160%);font-size:10px;color:#ffe9c0;opacity:.85;
    letter-spacing:.08em;text-shadow:0 0 6px rgba(255,220,150,.55);white-space:nowrap}
  #titleTools{display:flex;justify-content:flex-end;gap:8px;margin-bottom:4px}
  .tbtn{background:none;border:1px solid var(--line);color:#cfe2ff;border-radius:999px;
    padding:5px 14px;font-size:12px;cursor:pointer;font-family:var(--sans)}
  #courseRow{display:flex;gap:6px;justify-content:center;margin:2px 0 8px;flex-wrap:wrap}
  #optRowsCfg{display:inline-block;text-align:left}
  #optRowsCfg label{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;cursor:pointer}
  #optRowsCfg input{accent-color:var(--star-gold);width:15px;height:15px}
  #optRowsCfg select{background:#0c1430;color:#dfe8ff;border:1px solid var(--line);border-radius:6px;
    padding:4px 8px;font-size:13px;margin-left:8px;font-family:var(--sans)}
  body.puzzle .clabel{font-size:11.5px;opacity:.72;letter-spacing:.08em}

  /* タイトルの難易度・設定 */
  #diffRow{display:flex;gap:8px;justify-content:center;margin:4px 0 10px}
  .dbtn{background:none;border:1px solid var(--line);color:#cfe2ff;border-radius:999px;
    padding:6px 16px;font-size:12.5px;cursor:pointer;font-family:var(--sans);letter-spacing:.1em}
  .dbtn.sel{border-color:var(--star-gold);color:var(--star-gold);box-shadow:0 0 10px rgba(255,217,138,.25)}
  #optRows{display:inline-block;text-align:left;margin-bottom:14px}
  #optRows label{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;cursor:pointer}
  #optRows input{accent-color:var(--star-gold);width:15px;height:15px}
  #titleTop3{font-size:11.5px;opacity:.75;margin-top:10px;letter-spacing:.05em}

  /* ゲーム中の表示設定パネル */
  #hintPanel{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:12;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  #hintPanel label{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;cursor:pointer}
  #hintPanel input{accent-color:var(--star-gold);width:15px;height:15px}
  #pauseChip,#dispChip{cursor:pointer;font-size:12px}
  #viewPanel select{background:#0c1430;color:#dfe8ff;border:1px solid var(--line);border-radius:6px;
    padding:3px 6px;font-size:12px;margin-left:6px;font-family:var(--sans)}
  #pauseTime{font-size:34px;font-family:var(--serif);color:var(--star-gold);margin:10px 0 18px;font-variant-numeric:tabular-nums}

  /* ---- 星座あてクイズ ---- */
  #qzModeRow{display:flex;gap:8px;justify-content:center;margin:8px 0 6px}
  #quizPlay{position:fixed;inset:0;z-index:15;background:rgba(4,6,15,.82);display:none;flex-direction:column}
  #qzHud{text-align:center;padding:16px 56px 4px;position:relative}
  #qzQ{font-family:var(--serif);font-size:24px;color:var(--star-gold);letter-spacing:.12em;
    text-shadow:0 0 16px rgba(255,217,138,.35)}
  #qzProg{font-size:12px;opacity:.7;margin-top:4px}
  #qzQuitBtn{position:absolute;top:12px;right:12px;background:var(--panel);border:1px solid var(--line);
    color:#cfe2ff;border-radius:999px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--sans)}
  #qzFeed{text-align:center;min-height:24px;font-size:15px;margin:4px 0;letter-spacing:.1em}
  #qzFeed.ok{color:var(--ok)} #qzFeed.ng{color:var(--ng)}
  #qzGrid4{flex:1;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;
    align-content:center;padding:10px;overflow:auto}
  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px;
    cursor:pointer;transition:border-color .15s,box-shadow .15s;flex:0 0 auto}
  .qcard:hover{border-color:rgba(255,217,138,.5)}
  #qzGrid4 .qcard canvas{width:min(190px,40vw);height:min(132px,28vw);display:block}
  .qcard.good{border-color:var(--ok);box-shadow:0 0 16px rgba(167,232,180,.5)}
  .qcard.bad{border-color:var(--ng);animation:shk .35s}
  .qcard.dim{opacity:.35;pointer-events:none}
  #qzGrid4.ten .qcard canvas{width:min(128px,27vw);height:min(88px,19vw)}
  .qhints{margin-top:6px;padding:0 6px 2px;max-width:min(190px,40vw);font-size:11px;line-height:1.7;
    color:#cfe2ff;text-align:left;min-height:34px}
  .qhints .qh{opacity:0;transition:opacity .5s}
  .qhints .qh.show{opacity:.9}
  #qzScore{font-size:42px;font-family:var(--serif);color:var(--star-gold);margin:8px 0}

  /* 配置時の星座名ポップ */
  #namePop{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:9;pointer-events:none;
    font-family:var(--serif);font-size:34px;letter-spacing:.3em;color:var(--emerald);
    text-shadow:0 0 22px rgba(110,230,190,.55);opacity:0;transition:opacity .5s}

  .hud{position:fixed;z-index:10;user-select:none}
  #hud-top{top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 12px;pointer-events:none;gap:8px}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 12px;pointer-events:auto}
  #timer{font-variant-numeric:tabular-nums;font-size:18px;letter-spacing:.05em}
  #timer small{font-size:10px;opacity:.6;display:block;letter-spacing:.08em}
  #midChips{display:flex;gap:8px;pointer-events:auto}
  #progress{font-size:13px;text-align:right}
  #progress b{color:var(--star-gold);font-size:17px}
  #hint-bar{position:fixed;top:58px;left:50%;transform:translateX(-50%);max-width:94vw;text-align:center;z-index:11;
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:8px 18px;font-size:13px;
    opacity:0;transition:opacity .3s;pointer-events:none}
  #hint-bar.show{opacity:1}
  #hint-bar.ng{border-color:rgba(255,154,154,.5);color:var(--ng)}
  #hint-bar.ok{border-color:rgba(167,232,180,.6);color:var(--ok)}

  /* ---- ピーストレイ ---- */
  #trayWrap{position:fixed;left:0;right:0;bottom:0;z-index:10;
    background:linear-gradient(to top,rgba(4,6,15,.95) 70%,rgba(4,6,15,0))}
  #trayBar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 0}
  #trayBar .tinfo{font-size:11px;opacity:.7;letter-spacing:.08em}
  #sortBtn{background:none;border:1px solid var(--line);color:#cfe2ff;border-radius:999px;
    font-size:11px;padding:4px 12px;cursor:pointer;font-family:var(--sans)}
  #tray{display:flex;gap:7px;overflow-x:auto;overflow-y:hidden;padding:7px 10px calc(10px + env(safe-area-inset-bottom));
    scrollbar-width:thin}
  .piece{flex:0 0 auto;width:92px;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:5px 4px 6px;text-align:center;cursor:grab;transition:border-color .15s,box-shadow .15s;touch-action:pan-x}
  .piece.sel{border-color:var(--star-gold);box-shadow:0 0 12px rgba(255,217,138,.3)}
  .piece.shake{animation:shk .35s}
  @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .piece canvas{width:80px;height:54px;display:block;margin:0 auto;pointer-events:none}
  .piece .pname{font-size:10px;margin-top:2px;letter-spacing:.02em;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ドラッグ中ゴースト */
  #dragGhost{position:fixed;z-index:30;pointer-events:none;display:none;opacity:.9;
    filter:drop-shadow(0 0 10px rgba(110,230,190,.6))}
  #dragGhost canvas{width:96px;height:64px}
  #dragGhost .gname{text-align:center;font-size:11px;color:var(--emerald);text-shadow:0 0 6px rgba(110,230,190,.8)}

  /* 観賞モードパネル */
  #viewPanel{position:fixed;right:10px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:10;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 14px;display:none;min-width:176px}
  #viewPanel h3{font-family:var(--serif);font-size:13px;color:var(--star-gold);letter-spacing:.2em;margin-bottom:7px}
  #viewPanel label{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:4px 0;cursor:pointer}
  #viewPanel input{accent-color:var(--star-gold);width:15px;height:15px}
  #viewPanel .vbtn{margin-top:8px;width:100%;background:none;border:1px solid var(--line);color:#cfe2ff;
    border-radius:8px;padding:6px;font-size:12px;cursor:pointer;font-family:var(--sans)}

  .overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 60%,rgba(11,16,48,.55),rgba(4,6,15,.9))}
  .card{max-width:540px;width:calc(100vw - 36px);text-align:center;padding:32px 24px;
    background:rgba(8,12,30,.75);border:1px solid var(--line);border-radius:20px;max-height:92vh;overflow-y:auto}
  .card h1{font-family:var(--serif);font-size:42px;letter-spacing:.3em;color:var(--star-gold);
    text-shadow:0 0 24px rgba(255,217,138,.35);font-weight:500}
  .card .sub{font-family:var(--serif);letter-spacing:.35em;font-size:13px;opacity:.75;margin:6px 0 20px}
  .card p{font-size:13px;line-height:2;opacity:.85;margin-bottom:18px}
  .btn{display:inline-block;background:linear-gradient(180deg,#2a3d6e,#182550);border:1px solid var(--star-gold);
    color:#fff;border-radius:999px;padding:12px 34px;font-size:15px;letter-spacing:.18em;cursor:pointer;margin:4px 5px;font-family:var(--sans)}
  .btn.ghost{border-color:var(--line);opacity:.85}
  .btn:active{transform:scale(.97)}
  #clearCard h1{font-size:32px}
  #clearTime{font-size:40px;font-variant-numeric:tabular-nums;color:var(--star-gold);margin:8px 0 2px;font-family:var(--serif)}
  #bestLine{font-size:13px;opacity:.8;margin-bottom:18px}
  #newRecord{color:var(--ok);font-size:14px;letter-spacing:.2em;display:none;margin-bottom:6px}
  .howto{font-size:11.5px;line-height:1.9;opacity:.58;margin-top:12px}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="labels"></div>
<div id="namePop"></div>

<div id="hud-top" class="hud" style="display:none">
  <div class="chip" id="timer">0:00.0<small id="bestSmall"></small></div>
  <div id="midChips">
    <div class="chip" id="pauseChip"></div>
    <div class="chip" id="dispChip"></div>
  </div>
  <div class="chip" id="progress"><b>0</b> / 88</div>
</div>
<div id="hintPanel" class="hud" style="display:none">
  <label><input type="checkbox" id="gHint"><span id="lblGHint"></span></label>
  <label><input type="checkbox" id="gHintStars"><span id="lblGHintStars"></span></label>
  <label><input type="checkbox" id="gHintLines"><span id="lblGHintLines"></span></label>
  <label style="display:flex;align-items:center;gap:8px"><span id="lblGPiece"></span>
    <select id="gPieceMode" style="background:#0c1430;color:#dfe8ff;border:1px solid var(--line);border-radius:6px;padding:3px 6px;font-size:12px;font-family:var(--sans)">
      <option value="region" id="optGPieceRegion"></option>
      <option value="lines" id="optGPieceLines"></option>
      <option value="both" id="optGPieceBoth"></option>
    </select>
  </label>
  <label><input type="checkbox" id="gLines"><span id="lblGLines"></span></label>
  <label><input type="checkbox" id="gNames"><span id="lblGNames"></span></label>
</div>
<div id="hint-bar"></div>

<div id="trayWrap" class="hud" style="display:none">
  <div id="trayBar">
    <span class="tinfo" id="trayInfo">残り 88 ピース ── 上の空へドラッグ、またはタップで選んで空をタップ</span>
    <button id="sortBtn">並び: シャッフル</button>
  </div>
  <div id="tray"></div>
</div>
<div id="dragGhost"><canvas width="192" height="128"></canvas><div class="gname"></div></div>

<div id="viewPanel">
  <h3 id="vpTitle"></h3>
  <label><input type="checkbox" id="tgLines" checked><span id="lblTgLines"></span></label>
  <label><input type="checkbox" id="tgNames" checked><span id="lblTgNames"></span></label>
  <label><input type="checkbox" id="tgStars" checked><span id="lblTgStars"></span></label>
  <label style="display:block;padding:4px 0"><span id="lblTgFill"></span>
    <select id="tgFill">
      <option value="multi" id="optFillMulti"></option>
      <option value="mono" id="optFillMono"></option>
      <option value="off" id="optFillOff"></option>
    </select>
  </label>
  <label><input type="checkbox" id="tgBounds"><span id="lblTgBounds"></span></label>
  <label><input type="checkbox" id="tgMessier"><span id="lblTgMessier"></span></label>
  <label><input type="checkbox" id="tgAuto"><span id="lblTgAuto"></span></label>
  <button class="vbtn" id="backTitleBtn"></button>
</div>

<div class="overlay" id="titleOverlay">
  <div class="card">
    <div id="titleTools">
      <button class="tbtn" id="langBtn">English</button>
      <button class="tbtn" id="cfgBtn">⚙ 設定</button>
    </div>
    <h1>星合</h1>
    <div class="sub" id="titleSub">ほしあわせ ── 星座領域パズル</div>
    <p id="titleIntro"></p>
    <div id="courseRow">
      <button class="dbtn cbtn" data-c="z" id="cbZ"></button>
      <button class="dbtn cbtn" data-c="p" id="cbP"></button>
      <button class="dbtn cbtn sel" data-c="a" id="cbA"></button>
    </div>
    <div id="diffRow">
      <button class="dbtn" data-d="easy" id="dbEasy"></button>
      <button class="dbtn sel" data-d="normal" id="dbNorm"></button>
      <button class="dbtn" data-d="hard" id="dbHard"></button>
      <button class="dbtn" data-d="real" id="dbReal"></button>
    </div>
    <div id="optRows">
      <label><input type="checkbox" id="opHint" checked><span id="lblOpHint"></span></label>
      <label><input type="checkbox" id="opHintStars"><span id="lblOpHintStars"></span></label>
      <label><input type="checkbox" id="opHintLines"><span id="lblOpHintLines"></span></label>
      <label style="display:flex;align-items:center;gap:8px;padding:3px 0"><span id="lblOpPiece"></span>
        <select id="opPieceMode" style="background:#0c1430;color:#dfe8ff;border:1px solid var(--line);border-radius:6px;padding:3px 6px;font-size:12px;font-family:var(--sans)">
          <option value="region" id="optPieceRegion"></option>
          <option value="lines" id="optPieceLines"></option>
          <option value="both" id="optPieceBoth"></option>
        </select>
      </label>
      <label><input type="checkbox" id="opLines" checked><span id="lblOpLines"></span></label>
      <label><input type="checkbox" id="opNames"><span id="lblOpNames"></span></label>
    </div>
    <br>
    <button class="btn" id="startBtn"></button>
    <button class="btn" id="resumeBtn" style="display:none"></button>
    <button class="btn ghost" id="freeBtn"></button>
    <button class="btn ghost" id="quizBtn"></button>
    <div class="howto" id="howtoText"></div>
    <div id="titleTop3"></div>
  </div>
</div>

<div class="overlay" id="cfgOverlay" style="display:none">
  <div class="card">
    <h1 style="font-size:26px" id="cfgTitle"></h1>
    <div id="optRowsCfg">
      <label><input type="checkbox" id="cfgSound" checked><span id="lblSound"></span></label>
      <label><input type="checkbox" id="cfgInvert"><span id="lblInvert"></span></label>
      <label><input type="checkbox" id="cfgStarNames" checked><span id="lblStarNames"></span></label>
    </div>
    <br>
    <button class="btn" id="cfgClose"></button>
  </div>
</div>

<div class="overlay" id="pauseOverlay" style="display:none">
  <div class="card">
    <h1 style="font-size:30px" id="pauseTitle"></h1>
    <div id="pauseTime">0:00.0</div>
    <button class="btn" id="resumeGameBtn"></button>
    <button class="btn ghost" id="quitBtn"></button>
    <button class="btn ghost" id="quitNoSaveBtn"></button>
    <div class="howto" id="pauseNote"></div>
  </div>
</div>

<div class="overlay" id="quizSetup" style="display:none">
  <div class="card">
    <h1 style="font-size:26px" id="qzTitle"></h1>
    <p id="qzDesc"></p>
    <div id="qzModeRow">
      <button class="dbtn sel" id="qzHintOnBtn" data-h="1"></button>
      <button class="dbtn" id="qzHintOffBtn" data-h="0"></button>
    </div>
    <div class="howto" id="qzHintNote" style="margin-top:2px"></div>
    <br>
    <button class="btn" id="qzStartBtn"></button>
    <button class="btn ghost" id="qzCancelBtn"></button>
    <div id="qzBestLine" class="howto"></div>
  </div>
</div>

<div id="quizPlay">
  <div id="qzHud">
    <div id="qzQ"></div>
    <div id="qzProg"></div>
    <button id="qzQuitBtn"></button>
  </div>
  <div id="qzFeed"></div>
  <div id="qzGrid4"></div>
</div>

<div class="overlay" id="quizResult" style="display:none">
  <div class="card">
    <h1 style="font-size:28px" id="qzResTitle"></h1>
    <div id="qzScore"></div>
    <div id="qzTimeLine" style="font-size:14px;opacity:.8;margin-bottom:6px"></div>
    <div id="qzNewRec" style="color:var(--ok);letter-spacing:.2em;display:none;margin-bottom:8px"></div>
    <div id="qzResBest" class="howto" style="margin-bottom:14px"></div>
    <button class="btn" id="qzAgainBtn"></button>
    <button class="btn ghost" id="qzBackBtn"></button>
  </div>
</div>

<div class="overlay" id="clearOverlay" style="display:none">
  <div class="card" id="clearCard">
    <h1 id="clearTitle"></h1>
    <div class="sub" id="clearSub"></div>
    <div id="clearCourse" style="font-size:13px;color:var(--ui-blue);margin-bottom:6px"></div>
    <div id="newRecord"></div>
    <div id="clearTime">0:00.0</div>
    <div id="bestLine"></div>
    <button class="btn" id="viewBtn"></button>
    <button class="btn ghost" id="shareBtn"></button>
    <button class="btn ghost" id="retryBtn"></button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const DATA={"alphabet":"#$%&()*+,-./0123456789:;=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]^_`abcdefghijklmnopqrstuvwxyz{|}~","gridW":720,"gridH":360,"grid":"_____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________ /* ---------- データ展開 ---------- */
const A2I = new Int16Array(128).fill(-1);
[...DATA.alphabet].forEach((ch,i)=>A2I[ch.charCodeAt(0)]=i);
const GW = DATA.gridW, GH = DATA.gridH;
const GRID = new Uint8Array(GW*GH);
for(let i=0;i<GW*GH;i++) GRID[i] = A2I[DATA.grid.charCodeAt(i)];

function dirOf(raDeg, decDeg){
  const ra = raDeg*Math.PI/180, de = decDeg*Math.PI/180;
  return new THREE.Vector3(Math.cos(de)*Math.cos(ra), Math.sin(de), -Math.cos(de)*Math.sin(ra));
}
function lookupDir(v){
  const de = Math.asin(Math.max(-1,Math.min(1,v.y)))*180/Math.PI;
  let ra = Math.atan2(-v.z, v.x)*180/Math.PI; // -180..180
  const x = Math.min(GW-1, Math.max(0, Math.floor((ra+180)/0.5)));
  const y = Math.min(GH-1, Math.max(0, Math.floor((de+90)/0.5)));
  return GRID[y*GW+x];
}
const C = DATA.order.map((cid,i)=>({
  i, cid, ja: DATA.ja[i], en: DATA.en[i],
  centroid: dirOf(DATA.center[i][0]<0?DATA.center[i][0]+360:DATA.center[i][0], DATA.center[i][1]),
  center: DATA.center[i],
  placed:false, lineObj:null, boundObj:null, starIdx:[],
}));

function fmtTime(ms){
  const t=Math.max(0,ms), h=Math.floor(t/3600000), m=Math.floor(t%3600000/60000),
        s=Math.floor(t%60000/1000), d=Math.floor(t%1000/100);
  return (h?h+':':'')+`${h?String(m).padStart(2,'0'):m}:${String(s).padStart(2,'0')}.${d}`;
}

    vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
    fragmentShader:`
      precision mediump float;
      varying vec3 vP; uniform sampler2D uGrid, uState; uniform float uMono;
      void main(){
        vec3 n = normalize(vP);
        float de = asin(clamp(n.y,-1.,1.));
        float ra = atan(-n.z, n.x);
        vec2 uv = vec2(ra/6.2831853 + 0.5, de/3.14159265 + 0.5);
        float idx = texture2D(uGrid, uv).r * 255.0;
        vec4 st = texture2D(uState, vec2((idx+0.5)/88.0, 0.5));
        float on = st.r, flash = st.g;
        float h = n.y*0.5+0.5;
        vec3 base = mix(vec3(0.012,0.028,0.042), vec3(0.008,0.015,0.048), h);
        float t = fract(idx*0.618034);
        vec3 emerald = vec3(0.035,0.115,0.100);
        vec3 blue    = vec3(0.040,0.080,0.150);
        vec3 tintM = mix(emerald, blue, t) * (0.8 + 0.4*fract(idx*0.7548));
        vec3 tint = mix(tintM, (emerald+blue)*0.55, uMono);
        vec3 col = mix(base, base + tint, on);
        col += vec3(0.30,0.46,0.42) * flash;
        gl_FragColor = vec4(col, 1.0);
      }`
  })
);

function makeStarTexture(spikes){
  const s=128,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');
  const grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grd.addColorStop(0,'rgba(255,255,255,1)');grd.addColorStop(0.18,'rgba(255,250,235,.95)');
  grd.addColorStop(0.42,'rgba(200,215,255,.32)');grd.addColorStop(1,'rgba(150,180,255,0)');
  g.fillStyle=grd;g.fillRect(0,0,s,s);
  if(spikes){g.globalCompositeOperation='lighter';
    g.strokeStyle='rgba(255,244,214,.85)';g.lineWidth=2.2;g.lineCap='round';
    g.beginPath();g.moveTo(s/2,4);g.lineTo(s/2,s-4);g.moveTo(4,s/2);g.lineTo(s-4,s/2);g.stroke();
    g.strokeStyle='rgba(255,244,214,.3)';g.lineWidth=1;
    g.beginPath();g.moveTo(16,16);g.lineTo(s-16,s-16);g.moveTo(s-16,16);g.lineTo(16,s-16);g.stroke();}
  return new THREE.CanvasTexture(c);
}
const TX_STAR = makeStarTexture(false), TX_BRIGHT = makeStarTexture(true);
function magSize(m){ return Math.max(3.2, 26 - m*3.9); }
function magAlpha(m){ return Math.min(1, Math.max(.16, 1.12 - m*.15)); }
function bvColor(bv){ // B-V色指数 → 星の色
  const stops=[[-0.3,[.62,.72,1]],[0,[.77,.84,1]],[0.4,[.98,.97,1]],[0.8,[1,.94,.82]],[1.4,[1,.79,.54]],[2.2,[1,.6,.35]]];
  let a=stops[0],b=stops[stops.length-1];
  for(let i=0;i<stops.length-1;i++) if(bv>=stops[i][0]&&bv<=stops[i+1][0]){a=stops[i];b=stops[i+1];break;}
  const t=(bv-a[0])/((b[0]-a[0])||1);
  return [a[1][0]+(b[1][0]-a[1][0])*t, a[1][1]+(b[1][1]-a[1][1])*t, a[1][2]+(b[1][2]-a[1][2])*t];
}
const starUniforms = { uTime:{value:0}, uMap:{value:TX_STAR}, uHint:{value:0.0} };

const sPos=new Float32Array(NS*3), sSize=new Float32Array(NS), sCol=new Float32Array(NS*3),

const brightList=[];
DATA.stars.forEach((st,i)=>{

  const m=m10/10, d=dirOf(ra100/100,de100/100).multiplyScalar(R);
  sPos.set([d.x,d.y,d.z],i*3);
  sSize[i]=magSize(m);
  const col=bvColor(bv100/100); sCol.set(col,i*3);
  sPhase[i]=Math.random()*6.283;
  sAlpha[i]=magAlpha(m);
  sOn[i]=0;
  C[ci].starIdx.push(i);
  if(m<=1.6) brightList.push({dir:d.clone().normalize(), m, ci});
});

starGeo.setAttribute('aSize',new THREE.BufferAttribute(sSize,1));

starGeo.setAttribute('aPhase',new THREE.BufferAttribute(sPhase,1));
starGeo.setAttribute('aAlpha',new THREE.BufferAttribute(sAlpha,1));

  uniforms:starUniforms, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:`
    attribute float aSize; attribute vec3 aCol; attribute float aPhase; attribute float aAlpha; attribute float aOn;
    varying vec3 vCol; varying float vA; uniform float uTime; uniform float uHint;
    void main(){
      vCol=aCol;
      float tw = .84 + .16*sin(uTime*2.0 + aPhase);
      float lev = max(aOn, uHint);           // ヒント時は未配置でも uHint の明るさ
      vA = aAlpha * tw * lev;
      gl_PointSize = aSize * tw * (0.45 + 0.55*lev);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.);
    }`,
  fragmentShader:`
    precision mediump float;

    void main(){ gl_FragColor = vec4(vCol, vA) * texture2D(uMap, gl_PointCoord); }`

/* ---------- 境界線・星座線 ---------- */
function boundPoints(ci, radius){
  // 境界はRA/Dec空間の折れ線 → 長い辺は1.5°刻みで補間して滑らかに
  const pts=[];
  DATA.bounds[ci].forEach(ring=>{
    for(let k=0;k<ring.length;k++){
      const a=ring[k], b=ring[(k+1)%ring.length];
      const ra1=a[0]/10, de1=a[1]/10, de2=b[1]/10;
      let dra=b[0]/10-ra1;
      if(dra>180)dra-=360; if(dra<-180)dra+=360;
      const len=Math.hypot(dra*Math.cos((de1+de2)/2*Math.PI/180), de2-de1);
      const nseg=Math.max(1, Math.ceil(len/1.5));
      for(let s=0;s<nseg;s++){
        pts.push(dirOf(ra1+dra*s/nseg,     de1+(de2-de1)*s/nseg).multiplyScalar(radius),
                 dirOf(ra1+dra*(s+1)/nseg, de1+(de2-de1)*(s+1)/nseg).multiplyScalar(radius));
      }
    }
  });
  return pts;
}
/* 全境界(ヒント用) */
let hintLines;
{
  const pts=[];
  for(let i=0;i<N;i++) pts.push(...boundPoints(i, R*1.0));
  hintLines = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x6f8fd0, transparent:true, opacity:.16}));
  scene.add(hintLines);
}
const placedBoundGroup = new THREE.Group(); scene.add(placedBoundGroup);
const linesGroup = new THREE.Group(); scene.add(linesGroup);
function lineSegPoints(ci){
  const pts=[];
  DATA.lines[ci].forEach(seg=>{
    for(let k=0;k<seg.length-1;k++){
      const va=dirOf(seg[k][0]/100,seg[k][1]/100), vb=dirOf(seg[k+1][0]/100,seg[k+1][1]/100);
      const ang=va.angleTo(vb), nseg=Math.max(1,Math.ceil(ang/(4*Math.PI/180)));
      let p0=va;
      for(let s=1;s<=nseg;s++){
        const p1=va.clone().lerp(vb,s/nseg).normalize();
        pts.push(p0.clone().multiplyScalar(R*0.99), p1.clone().multiplyScalar(R*0.99));
        p0=p1;
      }
    }
  });
  return pts;
}
/* 星座線ヒント(全星座を薄く。配置済みは buildPlaced 側の明るい線が重なる) */
let lineHints;
{
  const pts=[];

  lineHints = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xffd98a, transparent:true, opacity:.12}));
  lineHints.visible=false;
  scene.add(lineHints);
}
function buildPlaced(c){
  if(!c.boundObj){
    c.boundObj = new THREE.LineSegments(
      new THREE.BufferGeometry().setFromPoints(boundPoints(c.i, R*0.998)),
      new THREE.LineBasicMaterial({color:0x6ee6be, transparent:true, opacity:0}));
    placedBoundGroup.add(c.boundObj);
  }
  if(!c.lineObj){
    const pts=lineSegPoints(c.i);
    c.lineObj = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0xffd98a, transparent:true, opacity:0, blending:THREE.AdditiveBlending}));
    c.lineObj.geometry.setDrawRange(0,0);
    linesGroup.add(c.lineObj);
  }
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
/* ピース描画用: 星座ごとの明るい星(4.8等まで) */
const pieceStars = Array.from({length:N},()=>[]);
DATA.stars.forEach(st=>{ if(st[2]<=48) pieceStars[st[4]].push(st); });

function projMaker(ci){
  // 星座中心を基準にした正距方位図法。天球を内側から見た形と一致する
  const c0=DATA.center[ci];
  const Cv=dirOf(c0[0]<0?c0[0]+360:c0[0], c0[1]);
  let E=new THREE.Vector3(0,1,0).cross(Cv);
  if(E.lengthSq()<1e-9) E.set(1,0,0);
  E.normalize();
  const Nv=new THREE.Vector3().crossVectors(Cv,E).normalize();
  return (raDeg,decDeg)=>{
    const P=dirOf(raDeg,decDeg);
    const d=P.angleTo(Cv)*180/Math.PI;
    const T=P.sub(Cv.clone().multiplyScalar(P.dot(Cv)));
    if(T.lengthSq()<1e-12) return {x:0,y:0};
    T.normalize();
    return {x:-d*T.dot(E), y:d*T.dot(Nv)};
  };
}
function ringPath2D(ci, proj){
  // 境界を1.5°刻みで補間しつつ投影 → 球面上の領域線と同じ形のピースになる
  return DATA.bounds[ci].map(ring=>{
    const out=[];
    for(let k=0;k<ring.length;k++){
      const a=ring[k], b=ring[(k+1)%ring.length];
      const ra1=a[0]/10, de1=a[1]/10, de2=b[1]/10;
      let dra=b[0]/10-ra1;
      if(dra>180)dra-=360; if(dra<-180)dra+=360;
      const len=Math.hypot(dra*Math.cos((de1+de2)/2*Math.PI/180), de2-de1);
      const nseg=Math.max(1, Math.ceil(len/1.5));
      for(let s=0;s<nseg;s++) out.push(proj(ra1+dra*s/nseg, de1+(de2-de1)*s/nseg));
    }
    return out;
  });
}
function drawSilhouette(cv, ci, scaleUp){
  const g=cv.getContext('2d'); const W=cv.width, H=cv.height;
  g.clearRect(0,0,W,H);
  const proj=projMaker(ci);
  const rings=ringPath2D(ci, proj);
  const showRegion = S.pieceMode!=='lines';   // 'region'|'both' で領域を描く
  const showStars  = S.pieceMode!=='region';  // 'lines'|'both' で星・線を描く
  // バウンディングは常に領域基準(どのモードでも同じ位置・拡大率にするため)
  let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
  rings.forEach(r=>r.forEach(p=>{ if(p.x<minx)minx=p.x; if(p.x>maxx)maxx=p.x; if(p.y<miny)miny=p.y; if(p.y>maxy)maxy=p.y; }));
  const pad=6, sc=Math.min((W-pad*2)/((maxx-minx)||1),(H-pad*2)/((maxy-miny)||1));
  const px=p=>({x:pad+(p.x-minx)*sc+(W-pad*2-(maxx-minx)*sc)/2, y:H-pad-((p.y-miny)*sc+(H-pad*2-(maxy-miny)*sc)/2)});
  if(showRegion){
    g.fillStyle='rgba(110,230,190,.16)';
    g.strokeStyle='rgba(110,230,190,.85)';
    g.lineWidth=scaleUp?1.6:1.1; g.lineJoin='round';
    rings.forEach(r=>{
      g.beginPath();
      r.forEach((p,i)=>{const P=px(p); i?g.lineTo(P.x,P.y):g.moveTo(P.x,P.y);});
      g.closePath(); g.fill(); g.stroke();
    });
  }
  if(!showStars) return;
  // 星座線(星の並びの目印)
  g.strokeStyle=showRegion?'rgba(255,217,138,.5)':'rgba(255,217,138,.7)';
  g.lineWidth=scaleUp?1.1:.8;
  DATA.lines[ci].forEach(seg=>{
    g.beginPath();
    seg.forEach((q,i)=>{const P=px(proj(q[0]/100,q[1]/100)); i?g.lineTo(P.x,P.y):g.moveTo(P.x,P.y);});
    g.stroke();
  });
  // 主な星
  pieceStars[ci].forEach(st=>{
    const m=st[2]/10;
    const P=px(proj(st[0]/100,st[1]/100));
    const r=Math.max(.7,(5.4-m)*.5)*(scaleUp?1.3:1);
    g.globalAlpha=Math.min(1,.4+(5.2-m)*.18);
    g.fillStyle='#fff6e0';
    g.beginPath(); g.arc(P.x,P.y,r,0,6.283); g.fill();
  });
  g.globalAlpha=1;
}

/* ピースの入力: タップ選択 or 上へドラッグ */
const dragGhost = el('dragGhost');
let dragging = null; // {c}
function attachPieceInput(elm, c){
  let sx=0, sy=0, active=false, isDrag=false;
  elm.addEventListener('pointerdown',e=>{
    sx=e.clientX; sy=e.clientY; active=true; isDrag=false;
    elm.setPointerCapture(e.pointerId);
  });
  elm.addEventListener('pointermove',e=>{
    if(!active) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(!isDrag && Math.abs(dy)>14 && Math.abs(dy)>Math.abs(dx)*1.1){
      isDrag=true; dragging={c};
      drawSilhouette(dragGhost.querySelector('canvas'), c.i, true);
      dragGhost.querySelector('.gname').textContent=nameOf(c.i);
      dragGhost.style.display='block';
      selectPiece(c, true);
    }
    if(isDrag){
      dragGhost.style.left=(e.clientX-48)+'px';
      dragGhost.style.top=(e.clientY-86)+'px';
    }
  });
  const up = e=>{
    if(!active) return; active=false;
    if(isDrag){
      dragGhost.style.display='none';
      const trayTop = el('trayWrap').getBoundingClientRect().top;
      if(e.clientY < trayTop-8){
        attemptPlace(c, dirFromScreen(e.clientX, e.clientY));
      }
      dragging=null;
    } else {
      // タップ = 選択
      selectPiece(c);
    }
  };
  elm.addEventListener('pointerup',up);
  elm.addEventListener('pointercancel',e=>{ active=false; isDrag=false; dragGhost.style.display='none'; dragging=null; });
}
function selectPiece(c, silent){
  if(c.placed || S.mode!=='puzzle') return;
  document.querySelectorAll('.piece.sel').forEach(p=>p.classList.remove('sel'));
  S.selected=c; S.missCount=0;
  const pe=el('pc-'+c.i); if(pe) pe.classList.add('sel');
  if(!silent) showMsg(T('selMsg')(nameOf(c.i)), '', 3200);
}

/* ---------- 配置 ---------- */
function dirFromScreen(x,y){
  const v=new THREE.Vector3((x/VW)*2-1, -(y/VH)*2+1, 0.5);
  v.unproject(camera); return v.normalize();
}
const anims=[];
function attemptPlace(c, dir){
  if(S.mode!=='puzzle'||c.placed) return;
  const hit = lookupDir(dir);
  const ok = hit===c.i || dir.angleTo(c.centroid)*180/Math.PI < 4;
  if(ok){ placePiece(c); }
  else {
    S.missCount++;
    let msg = T('missMsg')(nameOf(hit));
    if(S.missCount>=2){
      const local=c.centroid.clone().applyQuaternion(camera.quaternion.clone().invert());
      const d=[];
      if(local.z>0) d.push(T('opp'));
      else{
        if(local.x<-0.12)d.push(T('left')); if(local.x>0.12)d.push(T('right'));
        if(local.y>0.12)d.push(T('up')); if(local.y<-0.12)d.push(T('down'));
      }
      if(d.length) msg+=T('isAt')(nameOf(c.i), d.join(' '));
    }
    showMsg(msg,'ng',3000);
    const pe=el('pc-'+c.i); if(pe){pe.classList.remove('shake');void pe.offsetWidth;pe.classList.add('shake');}
    beep(160,.09,'sawtooth',.03);
  }
}
function placePiece(c, instant){
  c.placed=true; S.placedCount++;
  if(S.selected===c) S.selected=null;
  const pe=el('pc-'+c.i); if(pe) pe.remove();
  updateTrayInfo();
  buildPlaced(c);
  const idxs=c.starIdx, onAttr=starGeo.attributes.aOn;
  const totalV=c.lineObj.geometry.attributes.position.count;
  if(instant){
    S_REVEAL[c.i]=1; pushState();
    idxs.forEach(i=>onAttr.array[i]=1); onAttr.needsUpdate=true;
    c.boundObj.material.opacity=.42;
    c.lineObj.material.opacity=.65; c.lineObj.geometry.setDrawRange(0,totalV);
    return;
  }
  namePop(nameOf(c.i));
  showMsg(T('lit')(nameOf(c.i)), 'ok');
  chime(S.placedCount);
  const t0=performance.now();
  anims.push(now=>{
    const p=Math.min(1,(now-t0)/1200);
    S_REVEAL[c.i]=p;
    S_FLASH[c.i]=p<0.35 ? (p/0.35)*0.9 : Math.max(0,0.9*(1-(p-0.35)/0.5));
    pushState();
    const e=p*p*(3-2*p);
    idxs.forEach(i=>onAttr.array[i]=e); onAttr.needsUpdate=true;
    c.boundObj.material.opacity=.42*e;
    c.lineObj.material.opacity=.65*e;
    c.lineObj.geometry.setDrawRange(0,Math.ceil(totalV*p/2)*2);
    if(p>=1){ S_FLASH[c.i]=0; pushState(); return true; }
  });
  saveProgress();
  if(S.placedCount>=N) setTimeout(finishGame,1400);
}
function finishGame(){
  S.running=false; S.mode='clear';
  sDel('hoshi2-save'); window.__save=null; el('resumeBtn').style.display='none';
  const ms=S.elapsed;
  el('clearTime').textContent=fmtTime(ms);
  el('clearCourse').textContent=courseName(S.courseActive);
  const isNew = S.top3.length===0 || ms<S.top3[0];
  S.top3=[...S.top3, ms].sort((a,b)=>a-b).slice(0,3);

  el('newRecord').style.display=isNew?'block':'none';

}

/* ---------- モード遷移 ---------- */
function resetAll(){
  C.forEach(c=>{
    c.placed=false;
    if(c.lineObj){c.lineObj.material.opacity=0;c.lineObj.geometry.setDrawRange(0,0);}
    if(c.boundObj)c.boundObj.material.opacity=0;
  });
  S_REVEAL.fill(0); S_FLASH.fill(0); pushState();
  starGeo.attributes.aOn.array.fill(0); starGeo.attributes.aOn.needsUpdate=true;
  S.placedCount=0; S.selected=null;
}
function startPuzzle(resume){
  S.mode='puzzle';
  document.body.classList.add('puzzle');
  resetAll();
  sortMode='shuffle'; el('sortBtn').textContent=T('sortSh');
  let elapsed0=0;
  if(resume && window.__save){
    const sv=window.__save;
    elapsed0=sv.e||0; S.hint=sv.h!==0;
    S.courseActive=sv.m||'a';
    if(sv.o){ S.pieceMode=sv.o.pm||(sv.o.ps?'both':'region'); S.optLines=!!sv.o.l; S.optNames=!!sv.o.n;
      S.hintStars=!!sv.o.hs; S.hintLineart=!!sv.o.hl; }
    const targets=courseIdxSet(S.courseActive);
    S.pre=N-targets.size;
    trayOrder=shuffle([...targets]);
    buildTray();
    sv.p.forEach(i=>placePiece(C[i],true));
    buildTray();
    if(S.course!==S.courseActive){ S.course=S.courseActive; loadRecords(); saveCfg();
      document.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('sel', b.dataset.c===S.course)); }
  } else {
    S.hint=el('opHint').checked;
    S.pieceMode=el('opPieceMode').value;
    S.optLines=el('opLines').checked;
    S.optNames=el('opNames').checked;
    S.hintStars=el('opHintStars').checked;
    S.hintLineart=el('opHintLines').checked;
    sSet('hoshi2-opts', JSON.stringify({h:S.hint?1:0, pm:S.pieceMode, l:S.optLines?1:0, n:S.optNames?1:0, hs:S.hintStars?1:0, hl:S.hintLineart?1:0}));
    S.courseActive=S.course;
    const targets=courseIdxSet(S.courseActive);
    S.pre=N-targets.size;
    trayOrder=shuffle([...targets]);
    buildTray();
    C.forEach(c=>{ if(!targets.has(c.i)) placePiece(c,true); });  // 対象外は最初から灯す
    sDel('hoshi2-save');
    window.__save=null;
    el('resumeBtn').style.display='none';
  }
  syncGamePanel();
  applyHints();
  hintLines.visible=S.hint;
  linesGroup.visible=S.optLines;
  fillEnabled=true; sphere.material.uniforms.uMono.value=0; pushState();
  el('titleOverlay').style.display='none';
  el('clearOverlay').style.display='none';
  el('pauseOverlay').style.display='none';
  el('hintPanel').style.display='none';
  el('hud-top').style.display='flex';
  el('trayWrap').style.display='block';
  el('viewPanel').style.display='none';
  S.showNames=false; S.showMessier=false; messierGroup.visible=false;
  S.startAt=performance.now()-elapsed0; S.elapsed=elapsed0; S.running=true;
  updateTrayInfo();
}

/* シェア画像を作る: 天球の描画+タイトル・記録・URLを焼き込む */
function shareUrlOf(){
  return new URL('index.html', location.href).toString();
}
function buildShareCanvas(){
  const sw=renderer.domElement.width, sh=renderer.domElement.height;
  const W=1200, H=Math.round(W*sh/sw);
  const out=document.createElement('canvas'); out.width=W; out.height=H;
  const g=out.getContext('2d');
  g.drawImage(renderer.domElement, 0,0,sw,sh, 0,0,W,H);
  const SERIF='"Hiragino Mincho ProN","Yu Mincho",serif';
  const SANS='"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
  function rrect(x,y,w,h,r){
    g.beginPath();
    g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath();
  }
  // 外周の金の二重飾り枠
  g.strokeStyle='rgba(255,217,138,.55)'; g.lineWidth=3;
  g.strokeRect(14,14,W-28,H-28);
  g.strokeStyle='rgba(255,217,138,.25)'; g.lineWidth=1;
  g.strokeRect(22,22,W-44,H-44);
  // ---- 中央の結果パネル ----
  const PW=Math.min(W*0.78, 880), PH=Math.round(W*0.315);
  const px0=(W-PW)/2, py0=(H-PH)/2;
  g.save();
  rrect(px0,py0,PW,PH,22);
  g.fillStyle='rgba(5,9,24,.86)'; g.fill();
  g.strokeStyle='rgba(255,217,138,.6)'; g.lineWidth=2.5; g.stroke();
  rrect(px0+8,py0+8,PW-16,PH-16,16);
  g.strokeStyle='rgba(255,217,138,.22)'; g.lineWidth=1; g.stroke();
  g.restore();
  g.textAlign='center';
  // 上の飾り線 + コース名クリア!
  const clearWord = LANG==='ja' ? ' クリア!' : ' CLEAR!';
  const cy=py0+PH*0.26;
  g.strokeStyle='rgba(255,217,138,.4)'; g.lineWidth=1;
  g.beginPath(); g.moveTo(W/2-PW*0.34,cy-PH*0.13); g.lineTo(W/2+PW*0.34,cy-PH*0.13); g.stroke();
  g.fillStyle='#a7e8b4';
  g.font=`600 ${Math.round(W*0.030)}px ${SANS}`;
  g.fillText('✦ '+courseName(S.courseActive)+clearWord+' ✦', W/2, cy);
  // クリアタイム(主役)
  g.fillStyle='#ffd98a';
  g.shadowColor='rgba(255,217,138,.75)'; g.shadowBlur=30;
  g.font=`600 ${Math.round(W*0.092)}px ${SERIF}`;
  g.fillText(fmtTime(S.elapsed), W/2, py0+PH*0.62);
  g.shadowBlur=0;
  // 下の飾り線 + タイトル / URL
  g.strokeStyle='rgba(255,217,138,.4)';
  g.beginPath(); g.moveTo(W/2-PW*0.34,py0+PH*0.71); g.lineTo(W/2+PW*0.34,py0+PH*0.71); g.stroke();
  g.fillStyle='rgba(255,217,138,.95)';
  g.font=`500 ${Math.round(W*0.026)}px ${SERIF}`;
  g.fillText(LANG==='ja' ? '星合 -ほしあわせ-' : 'HOSHIAWASE ─ 星合', W/2, py0+PH*0.84);
  g.fillStyle='#8fd0ff';
  g.font=`${Math.round(W*0.0165)}px ${SANS}`;
  g.fillText(shareUrlOf(), W/2, py0+PH*0.945);
  g.textAlign='left';
  return out;
}
function canvasToBlob(cv){ return new Promise(res=>cv.toBlob(res,'image/png')); }
function downloadBlob(blob, name){
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name;

const QZ={hint:true, N:10, qs:[], idx:0, score:0, t0:0, wrongThis:false, locked:false};
function drawLineCard(cv, ci){
  // 星座線(+主な星)を、星座領域を基準にスケーリングして描く。
  // 領域はごく薄い輪郭で添え、星の並びが領域内のどこにあるかも手がかりになる
  const g=cv.getContext('2d'); const W=cv.width, H=cv.height;
  g.clearRect(0,0,W,H);
  const proj=projMaker(ci);
  const rings=ringPath2D(ci, proj);
  let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
  rings.forEach(r=>r.forEach(p=>{ if(p.x<minx)minx=p.x; if(p.x>maxx)maxx=p.x; if(p.y<miny)miny=p.y; if(p.y>maxy)maxy=p.y; }));
  const pad=8, sc=Math.min((W-pad*2)/((maxx-minx)||1),(H-pad*2)/((maxy-miny)||1));
  const px=p=>({x:pad+(p.x-minx)*sc+(W-pad*2-(maxx-minx)*sc)/2, y:H-pad-((p.y-miny)*sc+(H-pad*2-(maxy-miny)*sc)/2)});
  // 領域の薄い輪郭(文脈用)
  g.fillStyle='rgba(110,230,190,.05)';
  g.strokeStyle='rgba(110,230,190,.30)';
  g.lineWidth=1; g.lineJoin='round';
  rings.forEach(r=>{
    g.beginPath();
    r.forEach((p,i)=>{const P=px(p); i?g.lineTo(P.x,P.y):g.moveTo(P.x,P.y);});
    g.closePath(); g.fill(); g.stroke();
  });
  // 星座線
  g.strokeStyle='rgba(255,217,138,.8)'; g.lineWidth=1.4; g.lineCap='round';
  DATA.lines[ci].forEach(seg=>{
    g.beginPath();
    seg.forEach((q,i)=>{const P=px(proj(q[0]/100,q[1]/100)); i?g.lineTo(P.x,P.y):g.moveTo(P.x,P.y);});
    g.stroke();
  });
  // 主な星
  pieceStars[ci].forEach(st=>{
    const m=st[2]/10; if(m>4.5) return;
    const P=px(proj(st[0]/100,st[1]/100));
    g.globalAlpha=Math.min(1,.4+(4.8-m)*.2);
    g.fillStyle='#fff6e0';
    g.beginPath(); g.arc(P.x,P.y,Math.max(1,(4.8-m)*.65),0,6.283); g.fill();
  });
  g.globalAlpha=1;
}

function revealHintsProgressively(){
  // 難しいヒント(先頭)から順に表示し、時間経過で簡単なヒントを追加していく
  const cards=[...el('qzGrid4').querySelectorAll('.qcard')];
  const maxH=Math.max(0,...cards.map(c=>c.querySelectorAll('.qh').length));
  let step=0;
  clearInterval(QZ.hintTimer);
  const showStep=()=>{
    cards.forEach(c=>{
      const hs=c.querySelectorAll('.qh');
      if(hs[step]) hs[step].classList.add('show');
    });
    step++;
    if(step>=maxH) clearInterval(QZ.hintTimer);
  };
  showStep();                       // 最初の1つ(最も難しい)は即表示
  QZ.hintTimer=setInterval(showStep, 4500); // 4.5秒ごとに次のヒント
}
function startQuiz(){
  QZ.qs=shuffle(C.map(c=>c.i)).slice(0,QZ.N);
  QZ.idx=0; QZ.score=0; QZ.t0=performance.now();
  el('quizSetup').style.display='none';

function qzNext(){
  clearInterval(QZ.hintTimer);
  if(QZ.idx>=QZ.N){ qzFinish(); return; }
  QZ.wrongThis=false; QZ.locked=false;
  const target=QZ.qs[QZ.idx];
  el('qzQ').textContent=T('qWhich')(nameOf(target));
  el('qzProg').textContent=T('qProg')(QZ.idx+1, QZ.N);
  el('qzFeed').textContent=''; el('qzFeed').className='';
  const others=shuffle(C.map(c=>c.i).filter(i=>i!==target)).slice(0,3);
  const grid=el('qzGrid4'); grid.innerHTML='';
  shuffle([target,...others]).forEach(ci=>grid.appendChild(makeQCard(ci)));
  if(QZ.hint) revealHintsProgressively();
}
function qzPick(ci, card){
  if(QZ.locked) return;
  clearInterval(QZ.hintTimer);
  // 回答したら残りのヒントも全部見せる(答え合わせ・学習用)
  el('qzGrid4').querySelectorAll('.qh').forEach(h=>h.classList.add('show'));
  const target=QZ.qs[QZ.idx];
  if(ci===target){
    QZ.locked=true;
    if(!QZ.wrongThis) QZ.score++;
    card.classList.add('good');
    el('qzFeed').textContent=T('qCorrect'); el('qzFeed').className='ok';
    chime(QZ.score);
    QZ.idx++;
    setTimeout(qzNext, 850);
  } else {
    QZ.locked=true;
    card.classList.add('bad');
    el('qzGrid4').querySelectorAll('.qcard').forEach(c=>{
      if(Number(c.dataset.ci)===target) c.classList.add('good'); else if(c!==card) c.classList.add('dim');
    });
    el('qzFeed').textContent=T('qWrong')(nameOf(ci)); el('qzFeed').className='ng';
    beep(160,.12,'sawtooth',.03);
    QZ.idx++;
    setTimeout(qzNext, 1700);
  }
}
async function qzFinish(){
  clearInterval(QZ.hintTimer);

  el('qzScore').textContent=T('qScore')(QZ.score, QZ.N);

let skyDrag=false,lastX=0,lastY=0,velX=0,velY=0,pinch=0,moved=0;
const pointers=new Map();
canvas.addEventListener('pointerdown',e=>{
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===1){skyDrag=true;lastX=e.clientX;lastY=e.clientY;moved=0;canvas.classList.add('dragging');}
  if(pointers.size===2){const p=[...pointers.values()];pinch=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);}
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',e=>{
  if(!pointers.has(e.pointerId))return;
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){
    const p=[...pointers.values()];
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinch>0) fov=THREE.MathUtils.clamp(fov*pinch/d,FOV_MIN,FOV_MAX);
    pinch=d; return;
  }
  if(!skyDrag)return;
  const dx=e.clientX-lastX,dy=e.clientY-lastY;
  moved+=Math.abs(dx)+Math.abs(dy);
  const k=(fov/70)*0.0026*(S.cfgInv?-1:1);  // (2) 既定は従来と逆(直観方向)、設定で反転可
  yaw+=dx*k; pitch=THREE.MathUtils.clamp(pitch+dy*k,-Math.PI/2+.02,Math.PI/2-.02);
  velX=dx;velY=dy;lastX=e.clientX;lastY=e.clientY;
});
function skyUp(e){
  pointers.delete(e.pointerId);
  if(pointers.size<2)pinch=0;
  if(pointers.size===0){
    skyDrag=false;canvas.classList.remove('dragging');
    if(moved<7 && S.selected && S.mode==='puzzle'){
      attemptPlace(S.selected, dirFromScreen(e.clientX,e.clientY));
    }
  }
}
canvas.addEventListener('pointerup',skyUp);
canvas.addEventListener('pointercancel',skyUp);
canvas.addEventListener('wheel',e=>{e.preventDefault();fov=THREE.MathUtils.clamp(fov+e.deltaY*0.03,FOV_MIN,FOV_MAX);},{passive:false});

let AC=null;
function audioInit(){try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(f,dur,type,vol){
  if(!AC||!S.sound)return;
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(vol||.05,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+dur);
  o.connect(g).connect(AC.destination);o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function chime(n){
  const base=740+((n||0)%12)*18;
  beep(base,.4,'sine',.045);
  setTimeout(()=>beep(base*1.5,.55,'sine',.035),80);
  setTimeout(()=>beep(base*2,.8,'sine',.025),180);
}

/* (1) スマホのURLバー等でwindow.innerHeightと実描画領域がずれるため、
   キャンバスの実測サイズ(clientWidth/Height)を唯一の基準にする */
let VW=1, VH=1;
function resize(){
  VW=canvas.clientWidth||innerWidth;
  VH=canvas.clientHeight||innerHeight;
  renderer.setSize(VW,VH,false);
  camera.aspect=VW/VH;
  camera.updateProjectionMatrix();
}
addEventListener('resize',resize);
addEventListener('orientationchange',()=>setTimeout(resize,300));
resize();
if(VH>VW) fov=Math.min(FOV_MAX, 70*VH/VW*0.75);  // (2) 縦画面は初期視野を広く
const _v=new THREE.Vector3();
function viewDir(){const v=new THREE.Vector3();camera.getWorldDirection(v);return v;}
function updateLabels(){
  const w=VW,h=VH,cd=viewDir();
  const namesOn=(S.mode==='view'&&S.showNames);
  const messOn=(S.mode==='view'&&S.showMessier);
  const starsView=(S.mode==='view'&&S.showStars);
  labelItems.forEach(it=>{
    let show;
    if(it.type==='pole') show = true;
    else if(it.type==='name') show = namesOn || (S.mode!=='view' && S.optNames && it.ci>=0 && C[it.ci].placed);
    else if(it.type==='star') show = starsView || (S.mode!=='view' && S.cfgStars && it.ci>=0 && C[it.ci].placed);
    else show = messOn;
    if(!show||it.dir.dot(cd)<0.3){it.el.style.display='none';return;}
    _v.copy(it.dir).multiplyScalar(R).project(camera);
    if(_v.z>1){it.el.style.display='none';return;}
    it.el.style.display='block';
    it.el.style.left=(_v.x*.5+.5)*w+'px';
    it.el.style.top=(-_v.y*.5+.5)*h+'px';
  });
}
let prev=performance.now(), lastSave=0;
function loop(now){
  requestAnimationFrame(loop);
  if(canvas.clientWidth!==VW||canvas.clientHeight!==VH) resize();
  const dt=Math.min(.05,(now-prev)/1000);prev=now;
  starUniforms.uTime.value=now/1000;
  if(!skyDrag&&(Math.abs(velX)>.1||Math.abs(velY)>.1)){
    const k=(fov/70)*0.0026*(S.cfgInv?-1:1);
    yaw+=velX*k;pitch=THREE.MathUtils.clamp(pitch+velY*k,-Math.PI/2+.02,Math.PI/2-.02);
    velX*=.93;velY*=.93;
  }
  if(S.autoRotate&&!skyDrag&&S.mode==='view')yaw+=dt*0.025;
  camera.rotation.set(pitch,yaw,0);
  camera.fov+=(fov-camera.fov)*.2;camera.updateProjectionMatrix();
  brightSprites.forEach(sp=>{
    const u=sp.userData;
    const on=S_REVEAL[u.ci];
    sp.material.opacity=.9*on;
    if(on>0)sp.scale.setScalar(u.base*(1+.07*Math.sin(now/700+u.ph)));
  });
  for(let i=anims.length-1;i>=0;i--){if(anims[i](now))anims.splice(i,1);}
  if(S.running){
    S.elapsed=now-S.startAt;
    el('timer').firstChild.nodeValue=fmtTime(S.elapsed);
    if(now-lastSave>15000){lastSave=now;saveProgress();}
  }
  updateLabels();
  renderer.render(scene,camera);
}
requestAnimationFrame(loop);
</script>
